  <line x1="52" y1="494" x2="648" y2="494" stroke="#c8b89a" stroke-width="1"/>

  <rect x="52" y="508" width="596" height="64" rx="0" fill="none"/>
  <text x="72" y="548" font-size="20" font-weight="bold" fill="#3a5a40">Total a pagar:</text>
  <text x="628" y="548" text-anchor="end" font-size="20" font-weight="bold" fill="#b5593a">82.50€</text>

  <rect x="52" y="592" width="286" height="52" rx="6" fill="none" stroke="#3a5a40" stroke-width="1.5"/>
  <text x="195" y="623" text-anchor="middle" font-size="14" fill="#3a5a40">Seguir pidiendo</text>

