  <rect x="572" y="132" width="64" height="28" rx="4" fill="none" stroke="#b5593a" stroke-width="1.2"/>
  <text x="604" y="151" text-anchor="middle" font-size="11" font-weight="bold" fill="#b5593a">Eliminar</text>

  <rect x="52" y="200" width="596" height="82" rx="6" fill="#f5f0e1" stroke="#c8b89a" stroke-width="1"/>
