<svg viewBox="0 0 700 860" xmlns="http://www.w3.org/2000/svg" style="background:#f5f0e1;">
  <title>Mockup — Carrito · Il Ristorante</title>
  <style>
    text { font-family: Georgia, serif; }
  </style>

  <rect x="20" y="20" width="660" height="820" rx="10" fill="#fff" stroke="#c8b89a" stroke-width="1.5"/>

  <text x="350" y="76" text-anchor="middle" font-size="28" font-style="italic" fill="#b5593a">Resumen de tu Pedido</text>
  <line x1="60" y1="88" x2="640" y2="88" stroke="#c8b89a" stroke-width="1"/>

